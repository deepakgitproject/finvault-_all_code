      - finvault-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Pass@word1' -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  billing-service:
    build:
      context: .
      dockerfile: src/Services/BillingService/BillingService.API/Dockerfile
    container_name: billing-service
    ports:
      - "5003:8080"
    environment:
      - ConnectionStrings__Default=Server=billing-db;Database=credvault_billing;User Id=sa;Password=Pass@word1;TrustServerCertificate=True;
      - Jwt__SecretKey=ThisIsADevSecretKeyAtLeast32CharsLong!!
      - Jwt__Issuer=finvault-identity
      - Jwt__Audience=finvault-clients
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
